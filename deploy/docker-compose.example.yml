# Emby Keeper Docker Compose 完整示例（推荐：不使用 Web 控制台）
#
# 使用方法：
#   1. 把本文件复制为 docker-compose.yml
#   2. 在 ./app/config.toml 放入你的配置文件
#   3. 首次登录建议先交互运行一次：
#      docker run -v $(pwd)/app:/app --rm -it --net=host ghcr.io/coldboy404/emby-keeper:main
#   4. 启动后台服务：docker compose up -d
#
# 运行逻辑：
#   - 容器每次启动/重启都会自动执行一次任务（镜像入口默认带 --instant）。
#   - 容器不重启时，程序继续常驻，并按 config.toml 里的 time_range / interval_days 等配置定时运行。
#   - 不配置 Web 控制台密码/开关，不启动 Web 控制台，也不需要网页按钮控制任务。

services:
  emby-keeper:
    image: ghcr.io/coldboy404/emby-keeper:main
    container_name: emby-keeper
    restart: always

    environment:
      TZ: Asia/Shanghai

      # 可选：如需覆盖入口默认参数，也可以使用环境变量。
      # 镜像入口已经默认等效于 embykeeper --basedir /app --instant。
      # EK_INSTANT: "1"

      # 可选：如果你用 MongoDB/远程缓存，可按需开启。
      # EK_MONGODB: "mongodb://username:password@host:27017/embykeeper"

      # 可选：代理。若使用 network_mode: host 且代理在宿主机，可写 127.0.0.1。
      # HTTP_PROXY: "http://127.0.0.1:7890"
      # HTTPS_PROXY: "http://127.0.0.1:7890"
      # ALL_PROXY: "socks5://127.0.0.1:7890"

    volumes:
      # 持久化配置、Telegram session、缓存等数据。
      # 普通 Linux/NAS 可用 ./app:/app；fnOS 可改成 /vol1/1000/docker/embykeeper/app:/app
      - ./app:/app

    # 可选：用于连接宿主机上的代理；不需要宿主机网络时可删除。
    network_mode: host

    # 如果只想启用部分模块，可取消注释 command；这些参数会追加到默认 --instant 后面。
    # 例如只运行 Telegram 签到：command: ["--checkin"]
    # 例如只运行 Emby 保活：command: ["--emby"]
    # command: ["--checkin", "--emby"]
